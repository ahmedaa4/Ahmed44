<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity AI - المساعد الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .chat-container { height: calc(100vh - 180px); }
        .message { max-width: 85%; line-height: 1.6; }
        .user-message { background-color: #2563eb; color: white; border-radius: 1rem 1rem 0 1rem; }
        .ai-message { background-color: white; color: #1f2937; border-radius: 1rem 1rem 1rem 0; border: 1px solid #e5e7eb; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 antialiased">

    <!-- شريط التنقل (Navbar) -->
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600 flex items-center gap-2">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Clarity AI
            </h1>
            <div id="userInfo" class="hidden flex items-center gap-4">
                <span id="balanceDisplay" class="text-green-600 font-bold bg-green-50 px-3 py-1 rounded-full text-sm"></span>
                <button onclick="openDashboard()" class="text-sm bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-lg transition font-semibold">لوحة التحكم</button>
                <button onclick="logout()" class="text-sm text-red-500 hover:text-red-700 font-semibold transition">خروج</button>
            </div>
        </div>
    </nav>

    <!-- قسم المصادقة (التسجيل والدخول) -->
    <div id="authSection" class="max-w-md mx-auto mt-16 bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
        
        <!-- نموذج التسجيل -->
        <div id="registerDiv">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">إنشاء حساب جديد</h2>
            <form id="registerForm" class="space-y-4">
                <div><label class="block mb-1 text-sm font-semibold">معرف المستخدم (User ID)</label><input type="text" id="regUserId" required class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="مثال: ahmed123"></div>
                <div><label class="block mb-1 text-sm font-semibold">الاسم الكامل</label><input type="text" id="regName" required class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="أحمد محمد"></div>
                <div><label class="block mb-1 text-sm font-semibold">البريد الإلكتروني</label><input type="email" id="regEmail" required class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="ahmed@example.com"></div>
                <div><label class="block mb-1 text-sm font-semibold">كلمة المرور</label><input type="password" id="regPassword" required class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••"></div>
                <button type="submit" id="regBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-md">تسجيل وحصول على 100 نقطة</button>
            </form>
            <p class="mt-6 text-center text-sm text-gray-600">لديك حساب بالفعل؟ <button onclick="toggleAuth('login')" class="text-blue-600 font-bold hover:underline">تسجيل الدخول</button></p>
        </div>

        <!-- نموذج الدخول (مبسط) -->
        <div id="loginDiv" class="hidden">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">تسجيل الدخول</h2>
            <form id="loginForm" class="space-y-4">
                <div><label class="block mb-1 text-sm font-semibold">معرف المستخدم (User ID)</label><input type="text" id="loginUserId" required class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="أدخل معرفك هنا"></div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-md">دخول للدردشة</button>
            </form>
            <p class="mt-6 text-center text-sm text-gray-600">ليس لديك حساب؟ <button onclick="toggleAuth('register')" class="text-blue-600 font-bold hover:underline">إنشاء حساب جديد</button></p>
        </div>
    </div>

    <!-- قسم الدردشة -->
    <div id="chatSection" class="max-w-5xl mx-auto mt-6 hidden px-4">
        <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden flex flex-col chat-container">
            
            <!-- مساحة الرسائل -->
            <div id="chatMessages" class="flex-1 p-6 overflow-y-auto space-y-6 flex flex-col">
                <div class="ai-message p-4 message self-start">
                    👋 أهلاً وسهلاً بك في <strong>Clarity AI</strong>! أنا مساعدك الذكي، كيف يمكنني مساعدتك اليوم؟
                </div>
            </div>

            <!-- حقل الإدخال -->
            <div class="p-4 bg-gray-50 border-t border-gray-200">
                <form id="chatForm" class="flex gap-3">
                    <input type="text" id="chatInput" required placeholder="اسألني أي شيء..." class="flex-1 border border-gray-300 p-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition shadow-sm text-lg">
                    <button type="submit" id="sendBtn" class="bg-blue-600 text-white px-8 py-4 rounded-xl hover:bg-blue-700 transition font-bold shadow-md flex items-center">
                        <span id="sendText">إرسال</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- سكربت التشغيل -->
    <script>
        // ==========================================
        // ⚠️ ضع رابط سيرفر Railway الخاص بك هنا ⚠️
        // ==========================================
        const API_BASE_URL = 'https://YOUR_APP_NAME.up.railway.app'; 

        let currentUserId = localStorage.getItem('clarity_user_id');

        // التحقق من حالة الدخول عند تحميل الصفحة
        window.onload = () => {
            if (currentUserId) {
                showChat();
            }
        };

        // التبديل بين التسجيل والدخول
        function toggleAuth(type) {
            document.getElementById('registerDiv').classList.toggle('hidden', type === 'login');
            document.getElementById('loginDiv').classList.toggle('hidden', type === 'register');
        }

        // إظهار واجهة الدردشة
        function showChat() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('chatSection').classList.remove('hidden');
            document.getElementById('userInfo').classList.remove('hidden');
            document.getElementById('balanceDisplay').innerText = 'الرصيد متاح';
        }

        // تسجيل الخروج
        function logout() {
            localStorage.removeItem('clarity_user_id');
            location.reload();
        }

        // فتح لوحة التحكم
        function openDashboard() {
            if(currentUserId) {
                window.open(`${API_BASE_URL}/dashboard/${currentUserId}`, '_blank');
            }
        }

        // إضافة رسالة للشاشة
        function appendMessage(sender, text) {
            const chatMessages = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `p-4 message ${sender === 'user' ? 'user-message self-end' : 'ai-message self-start'}`;
            // استبدال النزول بسطر بـ <br> ليعرض بشكل صحيح
            msgDiv.innerHTML = text.replace(/\n/g, '<br>'); 
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // معالجة التسجيل
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            btn.innerHTML = '<span class="loader"></span> جاري التسجيل...';
            btn.disabled = true;

            const payload = {
                user_id: document.getElementById('regUserId').value,
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value
            };

            try {
                const res = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (res.ok) {
                    alert('تم التسجيل بنجاح! تم إضافة 100 نقطة لمحفظتك.');
                    localStorage.setItem('clarity_user_id', payload.user_id);
                    currentUserId = payload.user_id;
                    showChat();
                } else {
                    alert(data.detail || 'حدث خطأ أثناء التسجيل');
                }
            } catch (err) {
                alert('تعذر الاتصال بالسيرفر. تأكد من الرابط (API_BASE_URL).');
            } finally {
                btn.innerHTML = 'تسجيل وحصول على 100 نقطة';
                btn.disabled = false;
            }
        });

        // معالجة الدخول المبسط
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const userId = document.getElementById('loginUserId').value;
            localStorage.setItem('clarity_user_id', userId);
            currentUserId = userId;
            showChat();
        });

        // معالجة إرسال السؤال
        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('chatInput');
            const question = input.value.trim();
            if (!question) return;

            const btn = document.getElementById('sendBtn');
            const sendText = document.getElementById('sendText');
            
            // عرض رسالة المستخدم
            appendMessage('user', question);
            input.value = '';
            
            // حالة التحميل
            btn.disabled = true;
            sendText.innerHTML = '<span class="loader"></span>';

            try {
                const res = await fetch(`${API_BASE_URL}/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUserId, question: question })
                });
                const data = await res.json();

                if (res.ok) {
                    appendMessage('ai', data.answer);
                    if (data.remaining_balance !== undefined) {
                        document.getElementById('balanceDisplay').innerText = `الرصيد: ${data.remaining_balance} نقطة`;
                    }
                } else {
                    appendMessage('ai', `❌ خطأ: ${data.detail || data.answer || 'حدث خطأ غير معروف'}`);
                }
            } catch (err) {
                appendMessage('ai', '❌ عذراً، تعذر الاتصال بالسيرفر. يرجى المحاولة لاحقاً.');
            } finally {
                btn.disabled = false;
                sendText.innerText = 'إرسال';
            }
        });
    </script>
</body>
</html>
